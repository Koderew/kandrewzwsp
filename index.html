<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Copy a zero-width space character instantly to your clipboard.">
  <title>ZWSP | Copy a Zero-Width Space</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1 class="visually-hidden">Copy a Zero-Width Space</h1>
  <main class="wrap">
    <pre class="zwsp">&gt;&#8203;&lt;</pre>
    <p>there is a zero width space between those angle brackets.</p>
    <button id="copyBtn" class="clipboard-btn">copy it to my clipboard</button>
    <div id="status"></div>
  </main>
  <footer>
    by <a href="https://kandrewon.top"><u>Kandrew</u></a>
  </footer>
  <script src="script.js"></script>
</body>
</html>
